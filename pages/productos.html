<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Tienda online con productos y precios accesibles.">
    <meta name="keywords" content="tienda, ecommerce, productos, catálogo">
    <meta name="author" content="Luca Vanoli">

    <link rel="stylesheet" href="../css/style.css">

    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<header>
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="../img/logo.jfif" alt="logo" width="150px">
            </a>
        </div>
    </nav>
</header>

<!-- CARRITO -->
<div id="carrito-box">
    <h3>🛒 Carrito</h3>

    <div id="carrito"></div>

    <p id="total"></p>

    <p>Productos: <span id="contador">0</span></p>

    <button id="vaciar-carrito">Vaciar</button>
    <button id="finalizar-compra">Finalizar compra</button>
</div>

<!-- PRODUCTOS DINÁMICOS -->
<main>
    <div class="productos">
        <h1>Productos</h1>

        <!-- 🔥 ESTE ES EL IMPORTANTE -->
        <div id="contenedor-productos"></div>

    </div>
</main>

<footer>
    <p>&copy; 2025 Tienda de Ropa. Todos los derechos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/main.js"></script>

</body>
</html>
