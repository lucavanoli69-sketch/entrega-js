<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Tienda online con productos y precios accesibles.">
    <meta name="keywords" content="tienda, ecommerce, productos, catálogo">
    <meta name="author" content="Luca Vanoli">

    <link rel="stylesheet" href="../css/style.css">

    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<header>
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../img/logo.jfif" alt="logo" width="150px">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">FILTROS</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="productos.html">Productos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contactos.html">Contacto</a>
                        </li>
                    </ul>
                    <form class="d-flex mt-3" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</header>

<!-- CARRITO -->
<div id="carrito-box">
    <h3>🛒 Carrito</h3>

    <div id="carrito"></div>

    <p id="total"></p>

    <p>Productos: <span id="contador">0</span></p>

    <button id="vaciar-carrito">Vaciar</button>
    <button id="finalizar-compra">Finalizar compra</button>
</div>

<!-- PRODUCTOS DINÁMICOS -->
<main>
    <div class="productos">
        <h1>Productos</h1>

        <!-- 🔥 ESTE ES EL IMPORTANTE -->
        <div id="contenedor-productos"></div>

    </div>
</main>

<footer>
    <p>&copy; 2025 Tienda de Ropa. Todos los derechos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/main.js"></script>

</body>
</html>
